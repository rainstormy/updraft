# Manage devtools and tasks with mise-en-place.
# https://mise.jdx.dev/configuration.html

min_version = "2026.2.0"

[tools]
# actionlint is a linter for GitHub Actions workflows.
# https://github.com/rhysd/actionlint
actionlint = "1.7.11"

# Node.js is a JavaScript server runtime.
# https://nodejs.org
node = "24.14.0"

# pnpm is a Node.js package manager.
# https://pnpm.io
pnpm = "10.30.3"

[tasks.build]
depends = ["build-cli", "build-gha", "build-lib"]
description = "Runs `build-cli`, `build-gha`, and `build-lib`."
alias = ["b"]

[tasks.build-cli]
# language=sh
run = """
	vite build --outDir dist/cli/ --minify
"""
env = { MODULE = "cli" }
description = "Generates production-grade build artefacts of the command-line entrypoint with Vite."
alias = ["bc"]

[tasks.build-gha]
# language=sh
run = """
	vite build --outDir dist/gha/ --minify
"""
env = { MODULE = "gha" }
description = "Generates production-grade build artefacts of the GitHub Actions entrypoint with Vite."
alias = ["bg"]

[tasks.build-lib]
# language=sh
run = """
	vite build --outDir dist/lib/
"""
env = { MODULE = "lib" }
description = "Generates production-grade build artefacts of the core library with Vite."
alias = ["bl"]

[tasks.check]
depends = [
  "check-actions",
  "check-format",
  # "check-renovate", # Skipped because it is often quite slow.
  "check-types",
]
description = "Runs `check-actions`, `check-format`, and `check-types`."
alias = ["c"]

[tasks.check-actions]
# language=sh
run = """
	actionlint
"""
description = "Verifies the syntax of the GitHub Actions workflows with actionlint."
alias = ["ca"]

[tasks.check-format]
# language=sh
run = """
	biome check --error-on-warnings
"""
description = "Verifies the code style of the source code with Biome."
alias = ["cf"]

[tasks.check-renovate]
# language=sh
run = """
	pnpm dlx --package renovate renovate-config-validator
"""
description = "Verifies the syntax of the Renovate configuration."
alias = ["cr"]

[tasks.check-types]
# language=sh
run = """
	tsgo
"""
description = "Verifies the type safety of the source code with TypeScript."
alias = ["ct"]

[tasks.format]
# language=sh
run = """
	biome check --skip-parse-errors --write
"""
description = "Reformats the source code with Biome."
alias = ["f"]

[tasks.install]
# language=sh
run = """
	mise install
"""
description = "Installs all third-party dependencies with mise-en-place and pnpm and enables the Git hooks with Lefthook."
alias = ["i"]

[tasks.test]
# language=sh
run = """
	vitest run
"""
env = { CI = 1 }
description = "Runs the entire unit test suite once with Vitest."
alias = ["t"]

[tasks.vitest]
# language=sh
run = """
	vitest watch \
		--ui \
		--api.port "$LOCALHOST_VITEST_PORT" \
		--open "$LOCALHOST_VITEST_OPENS_AUTOMATICALLY"
"""
env = { CI = 1 }
description = "Starts the Vitest UI test explorer for continuous unit testing."
alias = ["v"]

[tasks.yolo]
# language=sh
run = """
	lefthook uninstall
"""
description = "Disables the Git hooks with Lefthook."

[hooks]
# language=sh
postinstall = """
  if [ -z "$CI" ]; then
    pnpm install --frozen-lockfile --ignore-scripts

    if [ -z "$LEFTHOOK" ] || [ "$LEFTHOOK" = '1' ] || [ "$LEFTHOOK" = 'true' ]; then
      lefthook install
    fi
  fi
"""

[env]
# Load environment variables from the following .env files in prioritised order.
# Variables declared in later files override earlier ones.
# https://mise.jdx.dev/environments/#env-file
_.file = [".env", ".env.local"]

# Make CLI programs in `node_modules` available directly in the command line.
# https://mise.jdx.dev/mise-cookbook/nodejs.html#add-node-modules-binaries-to-the-path
_.path = ["node_modules/.bin"]

# Grab the current Updraft version from the `version` field in `package.json`.
UPDRAFT_VERSION = { value = "{{ exec(command=\"jq --raw-output .version package.json\") }}" }

[settings]
# Enable mise hooks.
experimental = true

# Suppress printing the `run` input command in the console when running a mise task.
quiet = true
